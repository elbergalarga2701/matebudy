services:
  - type: web
    name: matebudy-backend
    env: node
    buildCommand: npm install --include=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_PANEL_CODE
        value: matebudy-admin-uy
      - key: CORS_ALLOWED_ORIGINS
        value: "https://matebudy.onrender.com,https://matebudy-1.onrender.com"
      - key: APP_FRONTEND_URL
        value: https://matebudy-1.onrender.com
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: UPLOADS_DIR
        value: ./uploads
