services:
  - type: web
    name: matebudy-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_PANEL_CODE
        value: matebudy-admin-uy
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: UPLOADS_DIR
        value: ./uploads
